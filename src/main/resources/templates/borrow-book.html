<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Borrow Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 th:text="'Borrow: ' + ${book.title}"></h2>

<div th:if="${isBorrowed}" class="alert alert-danger">
  No copies are currently available.
</div>

<div th:if="${!isBorrowed}" class="mt-3">
  <form th:action="@{/books/borrow/{id}(id=${book.id})}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <div class="mb-3">
      <label class="form-label">Borrow days (max 60)</label>
      <input type="number" name="days" class="form-control" min="1" max="60" value="14" required>
    </div>

    <button type="submit" class="btn btn-primary">Confirm Borrow</button>
    <a href="/books" class="btn btn-secondary">Cancel</a>
  </form>
</div>

</body>
</html>
