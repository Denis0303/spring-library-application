<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Book</title>
</head>
<body>
<h1>Edit Book</h1>

<form th:action="@{'/books/update/' + ${book.id}}" th:object="${book}" method="post">
  Title: <input type="text" th:field="*{title}"><br><br>
  Author: <input type="text" th:field="*{author}"><br><br>
  Year: <input type="number" th:field="*{year}"><br><br>

  <div class="mb-3">
    <label class="form-label">Price Per Day</label>
    <input type="number" step="0.01" min="0" th:field="*{pricePerDay}" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Total Copies</label>
    <input type="number" min="1" th:field="*{totalCopies}" class="form-control">
  </div>

  <button type="submit">💾 Save</button>
</form>

<br>
<a href="/books">⬅ Back</a>
</body>
</html>
