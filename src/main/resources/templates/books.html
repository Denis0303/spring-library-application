<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>📚 Library Books</h2>
        <form th:action="@{/logout}" method="post" class="d-inline">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <button type="submit" class="btn btn-secondary">
                Logout
            </button>
        </form>

    </div>

    <!-- SEARCH -->
    <form method="get" action="/books" class="row g-2 mb-3">
        <div class="col-md-6">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Search by title or author"
                   th:value="${keyword}">
        </div>

        <div class="col-md-2">
            <select name="sortBy" class="form-select">
                <option value="title" th:selected="${sortBy == 'title'}">Title</option>
                <option value="author" th:selected="${sortBy == 'author'}">Author</option>
                <option value="year" th:selected="${sortBy == 'year'}">Year</option>
            </select>
        </div>

        <div class="col-md-2">
            <select name="order" class="form-select">
                <option value="asc" th:selected="${order == 'asc'}">Asc</option>
                <option value="desc" th:selected="${order == 'desc'}">Desc</option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">Search</button>
        </div>
    </form>

    <!-- ADD BOOK (ADMIN ONLY) -->
    <div class="mb-3" sec:authorize="hasRole('ADMIN')">
        <a href="/books/new" class="btn btn-success">➕ Add Book</a>
    </div>

    <!-- BOOK TABLE -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Year</th>
            <th width="220">Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.year}"></td>

            <td>
                <!-- BORROW -->
                <a th:href="@{/books/borrow/{id}(id=${book.id})}"
                   class="btn btn-sm btn-primary">
                    Borrow
                </a>

                <!-- ADMIN ACTIONS -->
                <span sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/books/edit/{id}(id=${book.id})}"
                       class="btn btn-sm btn-warning">
                        Edit
                    </a>

                    <a th:href="@{/books/delete/{id}(id=${book.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure?')">
                        Delete
                    </a>
                </span>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(books)}">
            <td colspan="4" class="text-center text-muted">
                No books found
            </td>
        </tr>
        </tbody>
    </table>

    <!-- PAGINATION -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/books(page=${currentPage - 1}, keyword=${keyword}, sortBy=${sortBy}, order=${order})}">
                    Prev
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/books(page=${i}, keyword=${keyword}, sortBy=${sortBy}, order=${order})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/books(page=${currentPage + 1}, keyword=${keyword}, sortBy=${sortBy}, order=${order})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

</body>
</html>
