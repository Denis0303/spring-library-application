<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>All Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
<div class="container" th:with="borrowRepository=${@borrowRepository}">

    <h2 class="mb-3">📚 Book List</h2>

    <a href="/books/new" class="btn btn-primary mb-3">➕ Add Book</a>
    <a href="/my-borrows" class="btn btn-info mb-3">📖 My Borrowed Books</a>

    <!-- Sorting -->
    <p>
        Sort by:
        <a th:href="@{|/books?sortBy=title&order=${order == 'asc' ? 'desc' : 'asc'}&keyword=${keyword}|}">
            Title
        </a> |
        <a th:href="@{|/books?sortBy=author&order=${order == 'asc' ? 'desc' : 'asc'}&keyword=${keyword}|}">
            Author
        </a> |
        <a th:href="@{|/books?sortBy=year&order=${order == 'asc' ? 'desc' : 'asc'}&keyword=${keyword}|}">
            Year
        </a>
    </p>

    <!-- Search -->
    <form method="get" action="/books" class="d-flex mb-3">
        <input type="text" name="keyword" class="form-control"
               placeholder="Search by title or author"
               th:value="${keyword}">
        <button class="btn btn-success ms-2" type="submit">🔍 Search</button>
    </form>

    <table class="table table-bordered table-striped">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Year</th>
            <th>Actions</th>
        </tr>

        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.year}"></td>

            <td>
                <!-- Delete -->
                <a th:href="@{'/books/delete/' + ${book.id}}"
                   class="btn btn-danger btn-sm">
                    🗑 Delete
                </a>

                <!-- Edit -->
                <a th:href="@{'/books/edit/' + ${book.id}}"
                   class="btn btn-warning btn-sm">
                    ✏ Edit
                </a>

                <!-- Borrow Button IF NOT borrowed -->
                <a th:if="${borrowRepository.findByBookAndReturnedFalse(book).isEmpty()}"
                   th:href="@{'/books/borrow/' + ${book.id}}"
                   class="btn btn-success btn-sm mt-1">
                    📘 Borrow
                </a>

                <!-- Show “Borrowed” if someone else borrowed it -->
                <span th:unless="${borrowRepository.findByBookAndReturnedFalse(book).isEmpty()}"
                      class="text-danger fw-bold">
                    🔒 Borrowed
                </span>
            </td>
        </tr>
    </table>

    <!-- Pagination -->
    <div class="mt-3">
        <nav aria-label="Page navigation">
            <ul class="pagination">

                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{|/books?page=${currentPage - 1}&keyword=${keyword}&sortBy=${sortBy}&order=${order}|}">
                        ⬅ Previous
                    </a>
                </li>

                <li class="page-item disabled">
                    <span class="page-link">
                        Page <span th:text="${currentPage + 1}"></span>
                        of <span th:text="${totalPages}"></span>
                    </span>
                </li>

                <li class="page-item"
                    th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{|/books?page=${currentPage + 1}&keyword=${keyword}&sortBy=${sortBy}&order=${order}|}">
                        Next ➡
                    </a>
                </li>

            </ul>
        </nav>
    </div>

</div>
</body>
</html>
