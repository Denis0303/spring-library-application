<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Borrows</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
<div class="container">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>📖 My Borrowed Books</h2>

    <form th:action="@{/logout}" method="post" class="d-inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <button class="btn btn-secondary" type="submit">Logout</button>
    </form>
  </div>

  <a href="/books" class="btn btn-primary mb-3">⬅ Back to Books</a>

  <div th:if="${#lists.isEmpty(borrows)}" class="alert alert-info">
    You have no borrowed books yet.
  </div>

  <table th:if="${!#lists.isEmpty(borrows)}" class="table table-bordered table-striped">
    <thead>
    <tr>
      <th>Title</th>
      <th>Borrow Date</th>
      <th>Return Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="borrow : ${borrows}">
      <td th:text="${borrow.book != null ? borrow.book.title : 'Unknown'}"></td>
      <td th:text="${borrow.borrowDate}"></td>
      <td th:text="${borrow.returnDate}"></td>

      <td>
        <span th:if="${borrow.returned}" class="badge bg-success">Returned</span>
        <span th:if="${!borrow.returned}" class="badge bg-warning text-dark">Borrowed</span>
      </td>

      <td>
        <form th:if="${!borrow.returned}"
              th:action="@{/books/return/{id}(id=${borrow.id})}"
              method="post" class="d-inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="btn btn-sm btn-danger" type="submit"
                  onclick="return confirm('Return this book?')">
            Return
          </button>
        </form>
        <span th:if="${borrow.returned}" class="text-muted">—</span>
      </td>
    </tr>
    </tbody>
  </table>

</div>
</body>
</html>
