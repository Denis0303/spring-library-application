<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Add New Book</h2>

<form th:action="@{/books}" th:object="${book}" method="post">


  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

  <div class="mb-3">
    <label>Title</label>
    <input type="text" th:field="*{title}" class="form-control" required>
  </div>

  <div class="mb-3">
    <label>Author</label>
    <input type="text" th:field="*{author}" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Total Copies</label>
    <input type="number" min="1" th:field="*{totalCopies}" class="form-control">
  </div>

  <div class="mb-3">
    <label>Year</label>
    <input type="number"
           th:field="*{year}"
           class="form-control"
           min="0"
           step="1">
  </div>

  <div class="mb-3">
    <label class="form-label">Price Per Day</label>
    <input type="number" step="0.01" min="0" th:field="*{pricePerDay}" class="form-control">
  </div>

  <button type="submit" class="btn btn-success">Save</button>
  <a href="/books" class="btn btn-secondary">Cancel</a>
</form>

</body>
</html>
